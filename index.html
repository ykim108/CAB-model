<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>
        body { margin: 0; background-color: #151520; overflow: hidden; }
        #canvas-container {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.164.0';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.164.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.164.0/examples/jsm/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    // 1. HELPERS & LIGHTING
    // Red/Green/Blue lines to show the center of your world
    const axesHelper = new THREE.AxesHelper(5);
    scene.add(axesHelper);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(10, 10, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 2));
    const sun = new THREE.DirectionalLight(0xffffff, 3);
    sun.position.set(5, 10, 7.5);
    scene.add(sun);

    // 2. MODEL LOADER
    const loader = new GLTFLoader();
    loader.load('3js.glb', (gltf) => {
        const model = gltf.scene;

        // Calculate size and center
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        // Center the model at 0,0,0
        model.position.x += (model.position.x - center.x);
        model.position.y += (model.position.y - center.y);
        model.position.z += (model.position.z - center.z);

        // Rescale logic: Forces the largest side of the model to be 5 units
        const maxAxis = Math.max(size.x, size.y, size.z);
        const scaleFactor = 5 / maxAxis;
        model.scale.set(scaleFactor, scaleFactor, scaleFactor);

        // Optional: Make it look like a blue wireframe "Hologram"
        model.traverse((child) => {
            if (child.isMesh) {
                child.material = new THREE.MeshStandardMaterial({ 
                    color: 0x00ffff, 
                    wireframe: true,
                    transparent: true,
                    opacity: 0.6
                });
            }
        });

        scene.add(model);
        console.log("Model successfully scaled and added!");
    }, 
    (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% loaded'); },
    (error) => { console.error("Loading error:", error); });

    // 3. INTERACTION
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.0;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
